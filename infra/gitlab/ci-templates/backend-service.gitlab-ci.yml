# Divband reusable pipeline for backend services.
# Required variables: DIVBAND_RUNNER_TAG, DIVBAND_NAMESPACE, KUBE_CONFIG_B64,
# DIVBAND_PROJECT_ID, DIVBAND_API_BASE_URL, DIVBAND_API_TOKEN.

stages: [test, image, deploy, verify]

variables:
  APP_DIR: "."
  DOCKERFILE: "Dockerfile"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  KUBE_CONTEXT: "divband"
  KUBE_DEPLOYMENT: "backend"
  KUBE_CONTAINER: "backend"
  KUBE_SERVICE: "backend"
  SERVICE_PORT: "8080"
  PRODUCTION_HOST: "$CI_PROJECT_PATH_SLUG-api.divband.ir"
  HEALTHCHECK_PATH: "/healthz"
  EXPOSE_INGRESS: "false"

.divband_default:
  tags: ["$DIVBAND_RUNNER_TAG"]
  interruptible: true
  rules:
    - if: '$DIVBAND_RUNNER_TAG == null || $DIVBAND_RUNNER_TAG == ""'
      when: never
    - if: '$CI_COMMIT_BRANCH'

.report_deployment: &report_deployment |
  if [ -n "$DIVBAND_API_BASE_URL" ] && [ -n "$DIVBAND_PROJECT_ID" ] && [ -n "$DIVBAND_API_TOKEN" ]; then
    curl --fail --silent --show-error --header "Authorization: Bearer $DIVBAND_API_TOKEN" --header "Content-Type: application/json" \
      --data "{\"state\":\"${DEPLOYMENT_STATE}\",\"gitRef\":\"${CI_COMMIT_REF_NAME}\",\"commitSha\":\"${CI_COMMIT_SHA}\",\"environment\":\"production\",\"image\":\"${IMAGE_TAG}\",\"pipelineId\":\"${CI_PIPELINE_ID}\",\"jobUrl\":\"${CI_JOB_URL}\",\"ingressHostname\":\"${PRODUCTION_HOST}\",\"healthCheckUrl\":\"${HEALTHCHECK_URL}\",\"logLine\":\"${DEPLOYMENT_LOG}\"}" \
      "$DIVBAND_API_BASE_URL/projects/$DIVBAND_PROJECT_ID/deployments/report"
  fi

test_backend_service:
  extends: .divband_default
  stage: test
  image: node:22-alpine
  script:
    - cd "$APP_DIR"
    - if [ -f package-lock.json ]; then npm ci; elif [ -f package.json ]; then npm install; fi
    - if [ -f package.json ] && npm run | grep -q " lint"; then npm run lint; fi
    - if [ -f package.json ] && npm run | grep -q " test"; then npm test; fi
    - if [ -f package.json ] && npm run | grep -q " build"; then npm run build; fi

build_backend_image:
  extends: .divband_default
  stage: image
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs: ["test_backend_service"]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
  script:
    - >-
      /kaniko/executor
      --context "$CI_PROJECT_DIR/$APP_DIR"
      --dockerfile "$CI_PROJECT_DIR/$APP_DIR/$DOCKERFILE"
      --destination "$IMAGE_TAG"
      --destination "$IMAGE_LATEST"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/cache"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

deploy_backend_service:
  extends: .divband_default
  stage: deploy
  image: bitnami/kubectl:1.30
  needs: ["build_backend_image"]
  environment:
    name: production
    url: "https://$PRODUCTION_HOST"
  before_script:
    - test -n "$DIVBAND_NAMESPACE"
    - test -n "$KUBE_CONFIG_B64"
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
    - kubectl config use-context "$KUBE_CONTEXT"
    - export HEALTHCHECK_URL="http://$KUBE_SERVICE.$DIVBAND_NAMESPACE.svc.cluster.local:$SERVICE_PORT$HEALTHCHECK_PATH"
  script:
    - DEPLOYMENT_STATE=running DEPLOYMENT_LOG="backend rollout started" sh -c "$REPORT_DEPLOYMENT"
    - kubectl -n "$DIVBAND_NAMESPACE" set image "deployment/$KUBE_DEPLOYMENT" "$KUBE_CONTAINER=$IMAGE_TAG"
    - kubectl -n "$DIVBAND_NAMESPACE" rollout status "deployment/$KUBE_DEPLOYMENT" --timeout=240s
    - if [ "$EXPOSE_INGRESS" = "true" ]; then kubectl -n "$DIVBAND_NAMESPACE" annotate service "$KUBE_SERVICE" "divband.ir/host=$PRODUCTION_HOST" --overwrite; fi
  after_script:
    - export HEALTHCHECK_URL="http://$KUBE_SERVICE.$DIVBAND_NAMESPACE.svc.cluster.local:$SERVICE_PORT$HEALTHCHECK_PATH"
    - if [ "$CI_JOB_STATUS" != "success" ]; then DEPLOYMENT_STATE=failed DEPLOYMENT_LOG="backend rollout failed" sh -c "$REPORT_DEPLOYMENT"; fi
  variables:
    REPORT_DEPLOYMENT: *report_deployment
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

healthcheck_backend_service:
  extends: .divband_default
  stage: verify
  image: curlimages/curl:8.8.0
  needs: ["deploy_backend_service"]
  script:
    - if [ "$EXPOSE_INGRESS" = "true" ]; then curl --fail --retry 12 --retry-delay 5 --retry-all-errors "https://$PRODUCTION_HOST$HEALTHCHECK_PATH"; else echo "Cluster-internal service health checked by Kubernetes readiness probes."; fi
    - export HEALTHCHECK_URL="https://$PRODUCTION_HOST$HEALTHCHECK_PATH"
    - DEPLOYMENT_STATE=succeeded DEPLOYMENT_LOG="backend health check passed" sh -c "$REPORT_DEPLOYMENT"
  after_script:
    - export HEALTHCHECK_URL="https://$PRODUCTION_HOST$HEALTHCHECK_PATH"
    - if [ "$CI_JOB_STATUS" != "success" ]; then DEPLOYMENT_STATE=failed DEPLOYMENT_LOG="backend health check failed" sh -c "$REPORT_DEPLOYMENT"; fi
  variables:
    REPORT_DEPLOYMENT: *report_deployment
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
