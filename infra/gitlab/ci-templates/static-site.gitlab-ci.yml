# Reusable divband project pipeline.
# Include from a project with:
# include:
#   - project: divband/platform
#     file: /infra/gitlab/ci-templates/static-site.gitlab-ci.yml
#
# Required project variables provisioned by infra/gitlab/terraform:
# - DIVBAND_RUNNER_TAG: the only runner tag assigned to this project.
# - DIVBAND_NAMESPACE: the Kubernetes namespace for this project.
# - KUBE_CONFIG_B64: base64-encoded kubeconfig scoped to this namespace.

stages:
  - build
  - image
  - deploy

variables:
  APP_DIR: "."
  ARTIFACT_DIR: "dist"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  KUBE_CONTEXT: "divband"
  KUBE_DEPLOYMENT: "web"
  KUBE_CONTAINER: "web"

.default_divband_job:
  tags:
    - "$DIVBAND_RUNNER_TAG"
  interruptible: true
  rules:
    - if: '$DIVBAND_RUNNER_TAG == null || $DIVBAND_RUNNER_TAG == ""'
      when: never
    - if: '$CI_COMMIT_BRANCH'

build_artifact:
  extends: .default_divband_job
  stage: build
  image: node:22-alpine
  script:
    - cd "$APP_DIR"
    - |
      if [ -f package-lock.json ]; then
        npm ci
      elif [ -f package.json ]; then
        npm install
      fi
    - |
      if [ -f package.json ] && npm run | grep -q " build"; then
        npm run build
      else
        mkdir -p "$ARTIFACT_DIR"
        find . -mindepth 1 -maxdepth 1 ! -name "$ARTIFACT_DIR" -exec cp -R {} "$ARTIFACT_DIR/" \;
      fi
  artifacts:
    name: "$CI_PROJECT_PATH_SLUG-$CI_COMMIT_SHORT_SHA"
    paths:
      - "$APP_DIR/$ARTIFACT_DIR"
    expire_in: 7 days

build_and_push_image:
  extends: .default_divband_job
  stage: image
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs:
    - job: build_artifact
      artifacts: true
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<JSON
      {"auths":{"$CI_REGISTRY":{"username":"$CI_REGISTRY_USER","password":"$CI_REGISTRY_PASSWORD"}}}
      JSON
  script:
    - >-
      /kaniko/executor
      --context "$CI_PROJECT_DIR/$APP_DIR"
      --dockerfile "$CI_PROJECT_DIR/$APP_DIR/Dockerfile"
      --destination "$IMAGE_TAG"
      --destination "$IMAGE_LATEST"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/cache"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

deploy_kubernetes:
  extends: .default_divband_job
  stage: deploy
  image: bitnami/kubectl:1.30
  needs:
    - build_and_push_image
  environment:
    name: production
    url: "https://$CI_PROJECT_PATH_SLUG.divband.ir"
  before_script:
    - test -n "$DIVBAND_NAMESPACE"
    - test -n "$KUBE_CONFIG_B64"
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG_B64" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
    - kubectl config use-context "$KUBE_CONTEXT"
  script:
    - kubectl -n "$DIVBAND_NAMESPACE" set image "deployment/$KUBE_DEPLOYMENT" "$KUBE_CONTAINER=$IMAGE_TAG"
    - kubectl -n "$DIVBAND_NAMESPACE" rollout status "deployment/$KUBE_DEPLOYMENT" --timeout=180s
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
