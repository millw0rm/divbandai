---
cert_manager_manifest_url: https://github.com/cert-manager/cert-manager/releases/download/v1.15.3/cert-manager.yaml
cert_manager_cluster_issuer: letsencrypt-prod
cert_manager_dns01_cluster_issuer: letsencrypt-dns01-prod
cert_manager_acme_email: ops@divband.ir
cert_manager_acme_server: https://acme-v02.api.letsencrypt.org/directory
cert_manager_private_key_secret_name: letsencrypt-prod-account-key
cert_manager_dns01_private_key_secret_name: letsencrypt-dns01-prod-account-key
cert_manager_http01_ingress_class: "{{ ingress_class_name | default('nginx') }}"
cert_manager_dns01_zones:
  - divband.ir
cert_manager_dns01_webhook_group_name: acme.divband.io
cert_manager_dns01_webhook_solver_name: managed-dns
cert_manager_dns01_webhook_endpoint: http://divband-backend.divband.svc.cluster.local/internal/acme-challenges
cert_manager_dns01_webhook_token_secret_name: divband-acme-dns01-automation
cert_manager_dns01_webhook_token_secret_key: token
