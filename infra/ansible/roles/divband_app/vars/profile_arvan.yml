---
# Applied when divband_infrastructure_profile=arvan (see docs/infrastructure-profiles.md).
# Secrets (AOS keys, DNS_PROVIDER_TOKEN) still come from vault / divband-backend-env.

divband_object_storage_provider: s3
divband_object_storage_endpoint: https://s3.ir-thr-at1.arvanstorage.ir
divband_object_storage_region: ir-thr-at1
divband_object_storage_force_path_style: true

divband_dns_provider: arvan
divband_dns_provider_endpoint: https://napi.arvancloud.ir/cdn/4.0/domains
divband_dns_provider_apex_record_type: ANAME
