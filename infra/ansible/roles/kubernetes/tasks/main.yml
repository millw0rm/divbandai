---
- name: Fail when an unsupported Kubernetes distribution is selected
  ansible.builtin.fail:
    msg: "This bootstrap path currently implements k3s. Set kubernetes_distribution: k3s or extend the role for kubeadm."
  when: kubernetes_distribution != 'k3s'

- name: Allow Kubernetes API through host firewall
  ansible.builtin.command:
    cmd: ufw allow 6443/tcp
  register: kubernetes_ufw_api
  changed_when: "'Rule added' in kubernetes_ufw_api.stdout"
  when: kubernetes_node_role == 'control_plane'

- name: Install k3s server on control plane nodes
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL {{ kubernetes_k3s_install_url }} | \
      INSTALL_K3S_CHANNEL={{ kubernetes_k3s_channel }} \
      sh -s - server \
      --cluster-cidr {{ kubernetes_pod_cidr }} \
      --service-cidr {{ kubernetes_service_cidr }} \
      {{ '--disable traefik' if kubernetes_disable_builtin_ingress else '' }} \
      {{ ('--resolv-conf ' ~ (kubernetes_k3s_resolv_conf | trim)) if (kubernetes_k3s_resolv_conf | trim | length > 0) else '' }}
  args:
    executable: /bin/bash
    creates: /etc/systemd/system/k3s.service
  when: kubernetes_node_role == 'control_plane'

- name: Read generated k3s node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token
  when: kubernetes_node_role == 'control_plane'

- name: Publish k3s join token for later plays
  ansible.builtin.set_fact:
    kubernetes_join_token: "{{ k3s_node_token.content | b64decode | trim }}"
    cacheable: true
  when: kubernetes_node_role == 'control_plane'

- name: Wait for k3s kubeconfig on control plane
  ansible.builtin.wait_for:
    path: "{{ kubernetes_kubeconfig_remote_path }}"
    timeout: 120
  when: kubernetes_node_role == 'control_plane'

- name: Ensure kubeconfig is readable by operators on control plane
  ansible.builtin.file:
    path: "{{ kubernetes_kubeconfig_remote_path }}"
    mode: '0640'
  when: kubernetes_node_role == 'control_plane'

- name: Read generated kubeconfig from control plane
  ansible.builtin.slurp:
    src: "{{ kubernetes_kubeconfig_remote_path }}"
  register: k3s_kubeconfig
  no_log: true
  when: kubernetes_node_role == 'control_plane'

- name: Render endpoint kubeconfig on control plane
  ansible.builtin.copy:
    dest: "{{ kubernetes_kubeconfig_export_path }}"
    owner: root
    group: root
    mode: '0600'
    content: >-
      {{ k3s_kubeconfig.content | b64decode
        | replace('https://127.0.0.1:6443', kubernetes_api_endpoint)
        | regex_replace('name: default', 'name: ' ~ kubernetes_kubeconfig_context)
        | regex_replace('cluster: default', 'cluster: ' ~ kubernetes_kubeconfig_context)
        | regex_replace('user: default', 'user: ' ~ kubernetes_kubeconfig_context)
        | regex_replace('current-context: default', 'current-context: ' ~ kubernetes_kubeconfig_context) }}
  no_log: true
  when: kubernetes_node_role == 'control_plane'

- name: Create local kubeconfig artifact directory
  ansible.builtin.file:
    path: "{{ kubernetes_kubeconfig_local_path | dirname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false
  when: kubernetes_node_role == 'control_plane'

- name: Collect endpoint kubeconfig for operator hand-off
  ansible.builtin.fetch:
    src: "{{ kubernetes_kubeconfig_export_path }}"
    dest: "{{ kubernetes_kubeconfig_local_path }}"
    flat: true
  when: kubernetes_node_role == 'control_plane' and inventory_hostname == groups['k8s_control_plane'][0]

- name: Install k3s agent on worker nodes
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL {{ kubernetes_k3s_install_url }} | \
      K3S_URL={{ kubernetes_api_endpoint }} \
      K3S_TOKEN={{ hostvars[groups['k8s_control_plane'][0]].kubernetes_join_token | default(kubernetes_join_token) }} \
      INSTALL_K3S_CHANNEL={{ kubernetes_k3s_channel }} \
      sh -s - agent \
      {{ ('--resolv-conf ' ~ (kubernetes_k3s_resolv_conf | trim)) if (kubernetes_k3s_resolv_conf | trim | length > 0) else '' }}
  args:
    executable: /bin/bash
    creates: /etc/systemd/system/k3s-agent.service
  when: kubernetes_node_role == 'worker'
