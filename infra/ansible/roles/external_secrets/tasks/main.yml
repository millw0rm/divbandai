---
- name: Create External Secrets namespace
  ansible.builtin.command:
    cmd: "kubectl create namespace {{ external_secrets_namespace }} --dry-run=client -o yaml"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: external_secrets_namespace_manifest
  changed_when: false

- name: Apply External Secrets namespace
  ansible.builtin.command:
    cmd: kubectl apply -f -
    stdin: "{{ external_secrets_namespace_manifest.stdout }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: external_secrets_namespace_apply
  changed_when: "'configured' in external_secrets_namespace_apply.stdout or 'created' in external_secrets_namespace_apply.stdout"

- name: Install External Secrets Operator bundle
  ansible.builtin.command:
    cmd: "kubectl apply -f {{ external_secrets_manifest_url }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: external_secrets_apply
  changed_when: "'configured' in external_secrets_apply.stdout or 'created' in external_secrets_apply.stdout"

- name: Fail when an unsupported External Secrets provider is selected
  ansible.builtin.fail:
    msg: "Unsupported external_secrets_provider={{ external_secrets_provider }}. Use vault or disabled."
  when: external_secrets_provider not in ['vault', 'disabled']

- name: Render External Secrets ClusterSecretStore
  ansible.builtin.template:
    src: cluster-secret-store.yml.j2
    dest: /tmp/divband-cluster-secret-store.yml
    owner: root
    group: root
    mode: '0600'
  when: external_secrets_provider != 'disabled'

- name: Apply External Secrets ClusterSecretStore
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/divband-cluster-secret-store.yml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cluster_secret_store_apply
  changed_when: "'configured' in cluster_secret_store_apply.stdout or 'created' in cluster_secret_store_apply.stdout"
  when: external_secrets_provider != 'disabled'
