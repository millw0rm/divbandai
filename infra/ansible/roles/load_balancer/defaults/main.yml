---
load_balancer_packages:
  - haproxy
  - keepalived

# Bind all local addresses by default so a single host can answer both its VM
# IP and an optional keepalived VIP. Override with a specific IP if required.
load_balancer_bind_address: "*"
load_balancer_stats_enabled: false
load_balancer_stats_bind: "127.0.0.1:8404"

load_balancer_kubernetes_api_enabled: true
load_balancer_kubernetes_api_bind_port: 6443
load_balancer_kubernetes_api_target_group: k8s_control_plane
load_balancer_kubernetes_api_target_port: 6443

load_balancer_ingress_enabled: true
# public_ingress_target may be a single inventory group name or an explicit
# list of backend objects: [{ name: worker-1, address: 10.0.10.21 }].
public_ingress_target: k8s_workers
load_balancer_http_bind_port: 80
load_balancer_https_bind_port: 443
load_balancer_ingress_http_target_port: "{{ ingress_nginx_http_node_port | default(32080) }}"
load_balancer_ingress_https_target_port: "{{ ingress_nginx_https_node_port | default(32443) }}"
load_balancer_ingress_balance_algorithm: roundrobin

load_balancer_keepalived_enabled: "{{ public_vip is defined }}"
load_balancer_keepalived_interface: "{{ ansible_default_ipv4.interface | default('eth0') }}"
load_balancer_keepalived_virtual_router_id: 51
load_balancer_keepalived_auth_pass: "{{ vault_load_balancer_keepalived_auth_pass | default('REPLACE_WITH_VRRP_AUTH') }}"
load_balancer_keepalived_priority_base: 120
load_balancer_keepalived_advert_interval: 1
load_balancer_keepalived_state: "{{ 'MASTER' if inventory_hostname == groups['load_balancers'][0] else 'BACKUP' }}"
