---
- name: Fail when no backend path is enabled
  ansible.builtin.fail:
    msg: "Enable at least one load-balancer path with load_balancer_kubernetes_api_enabled or load_balancer_ingress_enabled."
  when: not load_balancer_kubernetes_api_enabled and not load_balancer_ingress_enabled

- name: Install load balancer packages
  ansible.builtin.package:
    name: "{{ load_balancer_packages }}"
    state: present

- name: Resolve Kubernetes API load balancer backends
  ansible.builtin.set_fact:
    load_balancer_kubernetes_api_backends: "{{ groups[load_balancer_kubernetes_api_target_group] | default([]) }}"
  when: load_balancer_kubernetes_api_enabled

- name: Resolve ingress load balancer backends from inventory group
  ansible.builtin.set_fact:
    load_balancer_ingress_backends: "{{ groups[public_ingress_target] | default([]) }}"
  when: load_balancer_ingress_enabled and public_ingress_target is string

- name: Resolve explicit ingress load balancer backends
  ansible.builtin.set_fact:
    load_balancer_ingress_backends: "{{ public_ingress_target }}"
  when: load_balancer_ingress_enabled and public_ingress_target is not string

- name: Fail when Kubernetes API backends are missing
  ansible.builtin.fail:
    msg: "No hosts found in {{ load_balancer_kubernetes_api_target_group }} for Kubernetes API forwarding."
  when: load_balancer_kubernetes_api_enabled and (load_balancer_kubernetes_api_backends | length == 0)

- name: Fail when ingress backends are missing
  ansible.builtin.fail:
    msg: "No ingress backends found from public_ingress_target={{ public_ingress_target }}."
  when: load_balancer_ingress_enabled and (load_balancer_ingress_backends | length == 0)

- name: Allow load balancer service ports through host firewall
  ansible.builtin.command:
    cmd: "ufw allow {{ item }}/tcp"
  register: load_balancer_ufw_ports
  changed_when: "'Rule added' in load_balancer_ufw_ports.stdout"
  loop: "{{ ([load_balancer_kubernetes_api_bind_port] if load_balancer_kubernetes_api_enabled else []) + ([load_balancer_http_bind_port, load_balancer_https_bind_port] if load_balancer_ingress_enabled else []) }}"

- name: Allow HAProxy to bind a floating VIP before keepalived owns it
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-divband-load-balancer.conf
    regexp: '^net\.ipv4\.ip_nonlocal_bind\s*='
    line: 'net.ipv4.ip_nonlocal_bind = 1'
    create: true
    owner: root
    group: root
    mode: '0644'
  register: load_balancer_ip_nonlocal_bind_config
  when: load_balancer_keepalived_enabled | bool

- name: Apply HAProxy floating VIP sysctl
  ansible.builtin.command:
    cmd: sysctl -w net.ipv4.ip_nonlocal_bind=1
  changed_when: load_balancer_ip_nonlocal_bind_config is changed
  when: load_balancer_keepalived_enabled | bool

- name: Render HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
    validate: haproxy -c -f %s
  notify: Restart haproxy

- name: Render keepalived configuration
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: '0600'
  notify: Restart keepalived
  no_log: true
  when: load_balancer_keepalived_enabled | bool

- name: Enable and start HAProxy
  ansible.builtin.service:
    name: haproxy
    enabled: true
    state: started

- name: Enable and start keepalived
  ansible.builtin.service:
    name: keepalived
    enabled: true
    state: started
  when: load_balancer_keepalived_enabled | bool

- name: Stop keepalived when no VIP is configured
  ansible.builtin.service:
    name: keepalived
    enabled: false
    state: stopped
  when: not (load_balancer_keepalived_enabled | bool)
