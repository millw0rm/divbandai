---
ingress_controller: nginx
ingress_nginx_manifest_url: https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/cloud/deploy.yaml
ingress_class_name: nginx
# The VM reference architecture places HAProxy/keepalived in front of the
# cluster, so ingress-nginx is exposed on stable node ports and the external
# load balancer forwards public 80/443 to those ports on public_ingress_target
# nodes. Set this to LoadBalancer when using MetalLB, kube-vip, or a cloud LB.
ingress_nginx_service_type: NodePort
ingress_nginx_http_node_port: 32080
ingress_nginx_https_node_port: 32443
