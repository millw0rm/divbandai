---
# Example inventory: same layout as inventory.vps.yml but with Arvan Cloud presets.
# Copy to inventory.yml (or merge vars into your production inventory).
#
# Prerequisites:
# - Kubernetes cluster on Arvan Cloud Container or k3s on Arvan Cloud Server
# - Arvan Object Storage bucket + S3 keys in vault
# - Arvan CDN API key for delegated DNS (DNS_PROVIDER_TOKEN)
#
# Docs: docs/infrastructure-profiles.md

all:
  vars:
    ansible_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3

    divband_infrastructure_profile: arvan

    kubernetes_distribution: k3s
    kubernetes_template_dir: "{{ playbook_dir }}/../../k8s/base"

    ingress_class_name: nginx
    cert_manager_cluster_issuer: letsencrypt-prod

    divband_public_hostname: divband.ir
    divband_api_base_url: https://api.divband.ir
    divband_public_site_domain: divband.ir
    divband_upload_domain: uploads.divband.ir

    # Arvan AOS — override bucket name; keys from Ansible Vault
    divband_object_storage_bucket: divband-sites-prod
    # divband_object_storage_access_key_id / secret: set via vault or divband-backend-env Secret

    # Delegated custom domains → ingress hostname or CDN origin
    divband_dns_provider_platform_ingress_target: ingress.divband.ir
    # divband_dns_provider_token: set via vault_divband_dns_provider_token

    divband_database_url: postgresql://divband:CHANGE_ME@postgres.example.com:5432/divband

  children:
    k8s_control_plane:
      hosts:
        control-1:
          ansible_host: REPLACE_WITH_ARVAN_VM_IP
