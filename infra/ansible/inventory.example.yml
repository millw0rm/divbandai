---
all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/divband-platform.pem
    ansible_python_interpreter: /usr/bin/python3

    divband_domain: divband.ir
    divband_environment: production
    divband_timezone: UTC
    divband_admin_users:
      - name: divband
        groups: [sudo]
        ssh_keys:
          - "ssh-ed25519 REPLACE_WITH_OPERATOR_PUBLIC_KEY divband-operator"

    container_runtime_engine: containerd
    kubernetes_distribution: k3s
    kubernetes_api_endpoint: "https://REPLACE_WITH_LOAD_BALANCER_OR_CONTROL_PLANE_IP:6443"
    kubernetes_pod_cidr: 10.42.0.0/16
    kubernetes_service_cidr: 10.43.0.0/16
    kubernetes_template_dir: "{{ playbook_dir }}/../../k8s/base"

    ingress_class_name: nginx
    ingress_nginx_service_type: NodePort
    ingress_nginx_http_node_port: 32080
    ingress_nginx_https_node_port: 32443
    public_ingress_target: k8s_workers

    cert_manager_cluster_issuer: letsencrypt-prod
    cert_manager_acme_email: ops@divband.ir
    cert_manager_acme_server: https://acme-v02.api.letsencrypt.org/directory

    external_secrets_store_name: divband-tenant-secrets
    external_secrets_provider: vault
    external_secrets_vault_server: https://vault.divband.ir
    external_secrets_vault_path: secret

    gitlab_mode: connect
    gitlab_url: https://git.divband.ir
    gitlab_external_url: "{{ gitlab_url }}"
    gitlab_terraform_dir: "{{ playbook_dir }}/../../gitlab/terraform"
    gitlab_runner_executor: kubernetes

    divband_namespace: divband-system
    # Use the immutable commit SHA tag published by CI. Set
    # DEPLOYMENT_IMAGE_TAG in CI only when you intentionally want an additional
    # mutable deployment pointer such as staging or production.
    divband_image_tag: REPLACE_WITH_COMMIT_SHA
    divband_backend_image_repository: registry.gitlab.com/divband/control-plane/backend
    divband_frontend_image_repository: registry.gitlab.com/divband/control-plane/frontend
    divband_backend_image: "{{ divband_backend_image_repository }}:{{ divband_image_tag }}"
    divband_frontend_image: "{{ divband_frontend_image_repository }}:{{ divband_image_tag }}"
    divband_public_hostname: app.divband.ir

    # Production control-plane application settings. Replace every placeholder
    # and store secret values with Ansible Vault or your external secret source.
    divband_api_base_url: https://app.divband.ir/api
    divband_public_site_domain: sites.divband.ir
    divband_upload_domain: uploads.divband.ir
    divband_object_storage_bucket: REPLACE_WITH_PRODUCTION_BUCKET
    divband_object_storage_endpoint: https://REPLACE_WITH_OBJECT_STORAGE_ENDPOINT
    divband_object_storage_region: REPLACE_WITH_OBJECT_STORAGE_REGION
    divband_object_storage_access_key_id: REPLACE_WITH_OBJECT_STORAGE_ACCESS_KEY_ID
    divband_object_storage_secret_access_key: REPLACE_WITH_OBJECT_STORAGE_SECRET_ACCESS_KEY
    divband_database_url: REPLACE_WITH_PRODUCTION_DATABASE_URL
    divband_gitlab_token: REPLACE_WITH_GITLAB_TOKEN
    # Alternatively set divband_gitlab_access_token instead of divband_gitlab_token.
    divband_gitlab_access_token: ""
    divband_token_hash_pepper: REPLACE_WITH_RANDOM_TOKEN_HASH_PEPPER

  children:
    k8s_control_plane:
      hosts:
        cp-1:
          ansible_host: 192.0.2.10
    k8s_workers:
      hosts:
        worker-1:
          ansible_host: 192.0.2.20
        worker-2:
          ansible_host: 192.0.2.21
    gitlab:
      hosts:
        gitlab-1:
          ansible_host: 192.0.2.30
    runners:
      hosts:
        runner-acme-marketing:
          ansible_host: 192.0.2.40
          gitlab_runner_project_key: acme/marketing
    load_balancers:
      hosts:
        lb-1:
          ansible_host: 192.0.2.50
          # Optional floating VIP shared by multiple load_balancers with keepalived.
          # Point kubernetes_api_endpoint and public platform DNS at this value when set.
          public_vip: 198.51.100.10
          load_balancer_keepalived_interface: eth0
    monitoring:
      hosts:
        monitoring-1:
          ansible_host: 192.0.2.60
