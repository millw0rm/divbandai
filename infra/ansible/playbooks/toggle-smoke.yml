---
- name: Confirm destructive toggle cycle was explicitly requested
  hosts: localhost
  gather_facts: false
  vars:
    divband_confirm_toggle_cycle: false
  tasks:
    - name: Require explicit confirmation
      ansible.builtin.assert:
        that:
          - divband_confirm_toggle_cycle | bool
        fail_msg: >-
          This playbook changes the live VPS between Arvan and non-Arvan modes.
          Re-run with -e divband_confirm_toggle_cycle=true to execute it.

- name: Apply Arvan mode
  ansible.builtin.import_playbook: vps-docker.yml
  vars:
    divband_arvan_enabled: true

- name: Validate Arvan mode
  ansible.builtin.import_playbook: validate-vps.yml
  vars:
    divband_arvan_enabled: true

- name: Apply non-Arvan mode
  ansible.builtin.import_playbook: vps-docker.yml
  vars:
    divband_arvan_enabled: false
    divband_install_docker: false
    divband_deploy_stack: true

- name: Validate non-Arvan mode
  ansible.builtin.import_playbook: validate-vps.yml
  vars:
    divband_arvan_enabled: false

- name: Restore Arvan mode
  ansible.builtin.import_playbook: vps-docker.yml
  vars:
    divband_arvan_enabled: true
    divband_install_docker: true
    divband_deploy_stack: true

- name: Validate restored Arvan mode
  ansible.builtin.import_playbook: validate-vps.yml
  vars:
    divband_arvan_enabled: true
