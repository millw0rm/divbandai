---
- name: Build and deploy divband from GitHub through the k3s registry
  hosts: k8s_control_plane[0]
  become: true
  roles:
    - role: cluster_registry
    - role: cert_manager
    - role: divband_release
    - role: divband_app
  tasks:
    - name: Restart divband deployments after image or secret updates
      ansible.builtin.command:
        cmd: "kubectl -n {{ divband_namespace }} rollout restart deployment/divband-backend deployment/divband-frontend"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: true

    - name: Wait for divband backend rollout
      ansible.builtin.command:
        cmd: "kubectl -n {{ divband_namespace }} rollout status deployment/divband-backend --timeout=180s"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Wait for divband frontend rollout
      ansible.builtin.command:
        cmd: "kubectl -n {{ divband_namespace }} rollout status deployment/divband-frontend --timeout=180s"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
