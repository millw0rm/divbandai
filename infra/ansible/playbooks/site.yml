---
- name: Prepare all divband hosts
  hosts: all
  become: true
  roles:
    - role: common

- name: Install container runtime on Kubernetes nodes and runners
  hosts: k8s_control_plane:k8s_workers:runners
  become: true
  roles:
    - role: container_runtime

- name: Bootstrap Kubernetes control plane
  hosts: k8s_control_plane
  become: true
  roles:
    - role: kubernetes
      kubernetes_node_role: control_plane

- name: Configure external load balancers
  hosts: load_balancers
  become: true
  roles:
    - role: load_balancer

- name: Join Kubernetes workers
  hosts: k8s_workers
  become: true
  roles:
    - role: kubernetes
      kubernetes_node_role: worker

- name: Install cluster platform add-ons
  hosts: k8s_control_plane[0]
  become: true
  roles:
    - role: ingress
    - role: cert_manager
    - role: external_secrets
    - role: observability
    - role: divband_app

- name: Provision or connect GitLab
  hosts: gitlab
  become: true
  roles:
    - role: gitlab

- name: Register GitLab runners
  hosts: runners
  become: true
  roles:
    - role: gitlab_runner
