---
- name: Manage Divband Docker VPS
  hosts: all
  become: true
  gather_facts: true

  vars:
    divband_arvan_enabled: true
    divband_install_docker: true
    divband_deploy_stack: true
    divband_app_dir: /opt/divband
    divband_domain: test.divband.com
    divband_unknown_domain: unknown.divband.com
    divband_backup_dir: /etc/divband/backups
    divband_ubuntu_sources_path: /etc/apt/sources.list.d/ubuntu.sources
    divband_ubuntu_sources_backup: /etc/divband/backups/ubuntu.sources.original
    divband_hosts_backup: /etc/divband/backups/hosts.original
    divband_arvan_hosts:
      - ip: 185.143.232.201
        names:
          - mirror.arvancloud.ir
          - docker.arvancloud.ir
      - ip: 185.143.232.253
        names:
          - mirror.arvancloud.ir
          - docker.arvancloud.ir
    divband_arvan_docker_packages:
      - docker.io=24.0.7-0ubuntu4
      - docker-compose-v2=2.24.6+ds1-0ubuntu2
      - containerd=1.7.12-0ubuntu4
      - runc=1.1.12-0ubuntu3
    divband_default_docker_packages:
      - docker.io
      - docker-compose-v2
      - containerd
      - runc

  tasks:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ divband_backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check original hosts backup
      ansible.builtin.stat:
        path: "{{ divband_hosts_backup }}"
      register: divband_hosts_backup_stat

    - name: Backup original hosts once
      ansible.builtin.copy:
        src: /etc/hosts
        dest: "{{ divband_hosts_backup }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      when: not divband_hosts_backup_stat.stat.exists

    - name: Check original Ubuntu sources backup
      ansible.builtin.stat:
        path: "{{ divband_ubuntu_sources_backup }}"
      register: divband_sources_backup_stat

    - name: Backup original Ubuntu sources once
      ansible.builtin.copy:
        src: "{{ divband_ubuntu_sources_path }}"
        dest: "{{ divband_ubuntu_sources_backup }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      when:
        - not divband_sources_backup_stat.stat.exists
        - ansible_facts.os_family == "Debian"

    - name: Configure Arvan host pins
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} DIVBAND ARVAN HOST PINS"
        block: |
          {% for host in divband_arvan_hosts %}
          {{ host.ip }} {{ host.names | join(' ') }}
          {% endfor %}
        owner: root
        group: root
        mode: "0644"
      when: divband_arvan_enabled | bool

    - name: Remove Arvan host pins
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} DIVBAND ARVAN HOST PINS"
        state: absent
      when: not (divband_arvan_enabled | bool)

    - name: Configure Arvan Ubuntu mirror
      ansible.builtin.template:
        src: ../templates/ubuntu.sources.arvan.j2
        dest: "{{ divband_ubuntu_sources_path }}"
        owner: root
        group: root
        mode: "0644"
      when:
        - divband_arvan_enabled | bool
        - ansible_facts.os_family == "Debian"

    - name: Restore original Ubuntu sources
      ansible.builtin.copy:
        src: "{{ divband_ubuntu_sources_backup }}"
        dest: "{{ divband_ubuntu_sources_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      when:
        - not (divband_arvan_enabled | bool)
        - ansible_facts.os_family == "Debian"
        - divband_sources_backup_stat.stat.exists

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      when:
        - divband_install_docker | bool
        - ansible_facts.os_family == "Debian"

    - name: Install Docker packages from Arvan-compatible pins
      ansible.builtin.apt:
        name: "{{ divband_arvan_docker_packages }}"
        state: present
        allow_downgrade: true
      when:
        - divband_install_docker | bool
        - divband_arvan_enabled | bool
        - ansible_facts.os_family == "Debian"

    - name: Install Docker packages from current apt sources
      ansible.builtin.apt:
        name: "{{ divband_default_docker_packages }}"
        state: present
      when:
        - divband_install_docker | bool
        - not (divband_arvan_enabled | bool)
        - ansible_facts.os_family == "Debian"

    - name: Enable Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      when: divband_install_docker | bool

    - name: Ensure app directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: "0755"
      loop:
        - "{{ divband_app_dir }}"
        - "{{ divband_app_dir }}/config/haproxy"
        - "{{ divband_app_dir }}/projects/test/html"
      when: divband_deploy_stack | bool

    - name: Render Docker Compose stack
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ divband_app_dir }}/docker-compose.yml"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: "0644"
      when: divband_deploy_stack | bool

    - name: Render HAProxy config
      ansible.builtin.template:
        src: ../templates/haproxy.cfg.j2
        dest: "{{ divband_app_dir }}/config/haproxy/haproxy.cfg"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: "0644"
      when: divband_deploy_stack | bool

    - name: Render Nginx project config
      ansible.builtin.template:
        src: ../templates/nginx.conf.j2
        dest: "{{ divband_app_dir }}/projects/test/nginx.conf"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: "0644"
      when: divband_deploy_stack | bool

    - name: Copy test welcome page
      ansible.builtin.copy:
        src: ../../../projects/test/html/index.html
        dest: "{{ divband_app_dir }}/projects/test/html/index.html"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: "0644"
      when: divband_deploy_stack | bool

    - name: Pull Compose images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ divband_app_dir }}"
      changed_when: "'Downloaded newer image' in divband_compose_pull.stdout or 'Pull complete' in divband_compose_pull.stdout"
      register: divband_compose_pull
      when: divband_deploy_stack | bool

    - name: Start Compose stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ divband_app_dir }}"
      changed_when: "'Started' in divband_compose_up.stdout or 'Created' in divband_compose_up.stdout or 'Recreated' in divband_compose_up.stdout"
      register: divband_compose_up
      when: divband_deploy_stack | bool

    - name: Check Compose status
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ divband_app_dir }}"
      changed_when: false
      register: divband_compose_ps
      when: divband_deploy_stack | bool

    - name: Smoke test routed test host
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ divband_domain }}"
        return_content: true
      register: divband_test_response
      failed_when:
        - divband_test_response.status != 200
          or 'Welcome to test' not in divband_test_response.content
      when: divband_deploy_stack | bool

    - name: Smoke test unknown host
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ divband_unknown_domain }}"
        return_content: true
        status_code: 404
      register: divband_unknown_response
      failed_when:
        - divband_unknown_response.status != 404
          or 'Unknown divband host' not in divband_unknown_response.content
      when: divband_deploy_stack | bool

    - name: Show Compose status
      ansible.builtin.debug:
        var: divband_compose_ps.stdout_lines
      when: divband_deploy_stack | bool
