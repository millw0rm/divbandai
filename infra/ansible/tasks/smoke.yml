---
- name: Smoke test routed public hosts
  ansible.builtin.uri:
    url: http://127.0.0.1/
    headers:
      Host: "{{ item.1 }}"
    return_content: true
    use_proxy: false
  register: divband_test_response
  failed_when:
    - divband_test_response.status != 200
      or ('Welcome to ' ~ item.0.name) not in divband_test_response.content
  loop: "{{ divband_projects | subelements('domains') }}"
  when: divband_deploy_stack | bool

- name: Smoke test unknown host
  ansible.builtin.uri:
    url: http://127.0.0.1/
    headers:
      Host: "{{ divband_unknown_domain }}"
    return_content: true
    status_code: 404
    use_proxy: false
  register: divband_unknown_response
  failed_when:
    - divband_unknown_response.status != 404
      or 'Unknown divband host' not in divband_unknown_response.content
  when: divband_deploy_stack | bool
