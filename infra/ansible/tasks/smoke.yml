---
- name: Run stack smoke checks
  when: divband_deploy_stack | bool
  block:
    - name: Wait for HAProxy to listen on port 80
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 80
        delay: 3
        timeout: 120
        state: started

    - name: Smoke test routed public hosts
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ item.1 }}"
        return_content: true
        use_proxy: false
      register: divband_test_response
      failed_when:
        - divband_test_response.status != 200
          or ('Welcome to ' ~ item.0.name) not in divband_test_response.content
      loop: "{{ divband_projects | subelements('domains') }}"

    - name: Smoke test unknown host
      ansible.builtin.uri:
        url: http://127.0.0.1/
        headers:
          Host: "{{ divband_unknown_domain }}"
        return_content: true
        status_code: 404
        use_proxy: false
      register: divband_unknown_response
      failed_when:
        - divband_unknown_response.status != 404
          or 'Unknown divband host' not in divband_unknown_response.content

  rescue:
    - name: Collect Compose status after smoke failure
      ansible.builtin.command:
        cmd: docker compose ps -a
        chdir: "{{ divband_app_dir }}"
      register: divband_smoke_compose_ps
      changed_when: false
      failed_when: false

    - name: Collect HAProxy logs after smoke failure
      ansible.builtin.command:
        cmd: docker logs divband-haproxy --tail 80
      register: divband_smoke_haproxy_logs
      changed_when: false
      failed_when: false

    - name: Report stack diagnostics
      ansible.builtin.debug:
        msg:
          - "{{ divband_smoke_compose_ps.stdout_lines | default(['compose ps unavailable']) }}"
          - "{{ divband_smoke_haproxy_logs.stdout_lines | default(['haproxy logs unavailable']) }}"

    - name: Fail smoke checks with diagnostics
      ansible.builtin.fail:
        msg: >-
          Stack smoke failed (nothing on port 80 or bad HTTP responses).
          On the host run: docker compose -f {{ divband_app_dir }}/docker-compose.yml ps -a;
          docker logs divband-haproxy; sudo ss -tlnp | grep ':80'.
          Common causes: port 80 already in use, HAProxy config error, or app container crashed.
