apiVersion: v1
kind: ConfigMap
metadata:
  name: welcome-page
  namespace: REPLACE_WITH_NAMESPACE
  labels:
    app.kubernetes.io/name: welcome
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/project-slug: REPLACE_WITH_SLUG
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>REPLACE_WITH_PROJECT_NAME</title>
        <style>
          :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, sans-serif; }
          body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(160deg, #0f172a 0%, #1e293b 45%, #334155 100%);
            color: #f8fafc;
          }
          main {
            max-width: 42rem;
            padding: 2.5rem;
            border-radius: 1rem;
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.35);
            box-shadow: 0 24px 48px rgba(2, 6, 23, 0.35);
          }
          h1 { margin: 0 0 0.75rem; font-size: 1.75rem; }
          p { margin: 0.35rem 0; line-height: 1.6; color: #cbd5e1; }
          code {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.35rem 0.6rem;
            border-radius: 0.4rem;
            background: rgba(30, 41, 59, 0.9);
            color: #e2e8f0;
          }
        </style>
      </head>
      <body>
        <main>
          <h1>Welcome to REPLACE_WITH_PROJECT_NAME</h1>
          <p>Your Divband project is live. This placeholder site confirms routing and Kubernetes provisioning succeeded.</p>
          <p>Push your application through Git to replace this page with your own deployment.</p>
          <code>REPLACE_WITH_PLATFORM_HOSTNAME</code>
        </main>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: welcome
  namespace: REPLACE_WITH_NAMESPACE
  labels:
    app.kubernetes.io/name: welcome
    app.kubernetes.io/component: welcome
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/project-slug: REPLACE_WITH_SLUG
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
spec:
  replicas: REPLACE_WITH_WELCOME_REPLICAS
  selector:
    matchLabels:
      app.kubernetes.io/name: welcome
      divband.io/project-id: REPLACE_WITH_PROJECT_ID
  template:
    metadata:
      labels:
        app.kubernetes.io/name: welcome
        app.kubernetes.io/component: welcome
        divband.io/project-id: REPLACE_WITH_PROJECT_ID
        divband.io/project-slug: REPLACE_WITH_SLUG
        divband.io/expose: public
        divband.io/tenant-id: REPLACE_WITH_TENANT_ID
        divband.io/environment: REPLACE_WITH_ENVIRONMENT
        divband.io/owner-id: REPLACE_WITH_OWNER_ID
    spec:
      serviceAccountName: project-deployer
      containers:
        - name: welcome
          image: REPLACE_WITH_WELCOME_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: welcome-page
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            requests:
              cpu: REPLACE_WITH_WELCOME_CPU_REQUEST
              memory: REPLACE_WITH_WELCOME_MEMORY_REQUEST
            limits:
              cpu: REPLACE_WITH_WELCOME_CPU_LIMIT
              memory: REPLACE_WITH_WELCOME_MEMORY_LIMIT
      volumes:
        - name: welcome-page
          configMap:
            name: welcome-page
---
apiVersion: v1
kind: Service
metadata:
  name: welcome
  namespace: REPLACE_WITH_NAMESPACE
  labels:
    app.kubernetes.io/name: welcome
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: welcome
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
  ports:
    - name: http
      port: 80
      targetPort: http
