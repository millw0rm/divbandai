apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: project-secrets
  namespace: project-REPLACE_WITH_SLUG
  labels:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/project-slug: REPLACE_WITH_SLUG
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
  annotations:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: REPLACE_WITH_CLUSTER_SECRET_STORE
  target:
    name: project-secrets
    creationPolicy: Owner
    template:
      metadata:
        labels:
          divband.io/project-id: REPLACE_WITH_PROJECT_ID
          divband.io/project-slug: REPLACE_WITH_SLUG
          divband.io/tenant-id: REPLACE_WITH_TENANT_ID
          divband.io/environment: REPLACE_WITH_ENVIRONMENT
          divband.io/owner-id: REPLACE_WITH_OWNER_ID
        annotations:
          divband.io/project-id: REPLACE_WITH_PROJECT_ID
          divband.io/tenant-id: REPLACE_WITH_TENANT_ID
          divband.io/environment: REPLACE_WITH_ENVIRONMENT
          divband.io/owner-id: REPLACE_WITH_OWNER_ID
  dataFrom:
    - extract:
        key: projects/REPLACE_WITH_PROJECT_ID/REPLACE_WITH_ENVIRONMENT
