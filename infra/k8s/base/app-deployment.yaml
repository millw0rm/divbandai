apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: project-REPLACE_WITH_SLUG
  labels:
    app.kubernetes.io/name: web
    divband.io/project-slug: REPLACE_WITH_SLUG
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        divband.io/project-slug: REPLACE_WITH_SLUG
    spec:
      serviceAccountName: deployer
      containers:
        - name: web
          image: registry.git.divband.ir/REPLACE_WITH_OWNER/REPLACE_WITH_SLUG:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: project-REPLACE_WITH_SLUG
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 80
      targetPort: 8080
