# Deprecated compatibility bundle.
# Prefer the role-specific templates in this directory:
# - frontend-deployment.yaml
# - backend-deployment.yaml
# - static-site-deployment.yaml
# This file keeps the original web workload shape for callers that still render it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: project-REPLACE_WITH_SLUG
  labels:
    app.kubernetes.io/name: web
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/project-slug: REPLACE_WITH_SLUG
spec:
  replicas: REPLACE_WITH_WEB_REPLICAS
  selector:
    matchLabels:
      app.kubernetes.io/name: web
      divband.io/project-id: REPLACE_WITH_PROJECT_ID
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        divband.io/project-id: REPLACE_WITH_PROJECT_ID
        divband.io/project-slug: REPLACE_WITH_SLUG
        divband.io/expose: public
    spec:
      serviceAccountName: project-deployer
      containers:
        - name: web
          image: REPLACE_WITH_WEB_IMAGE
          ports:
            - name: http
              containerPort: REPLACE_WITH_WEB_CONTAINER_PORT
          readinessProbe:
            httpGet:
              path: REPLACE_WITH_WEB_HEALTH_PATH
              port: http
          resources:
            requests:
              cpu: REPLACE_WITH_WEB_CPU_REQUEST
              memory: REPLACE_WITH_WEB_MEMORY_REQUEST
            limits:
              cpu: REPLACE_WITH_WEB_CPU_LIMIT
              memory: REPLACE_WITH_WEB_MEMORY_LIMIT
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: project-REPLACE_WITH_SLUG
spec:
  selector:
    app.kubernetes.io/name: web
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
  ports:
    - name: http
      port: 80
      targetPort: http
