apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-web
  namespace: project-REPLACE_WITH_SLUG
  labels:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/project-slug: REPLACE_WITH_SLUG
  annotations:
    cert-manager.io/cluster-issuer: REPLACE_WITH_CLUSTER_ISSUER
    external-dns.alpha.kubernetes.io/hostname: REPLACE_WITH_SLUG.divband.ir,REPLACE_WITH_VERIFIED_CUSTOM_DOMAIN
spec:
  ingressClassName: REPLACE_WITH_INGRESS_CLASS
  tls:
    - secretName: public-web-tls
      hosts:
        - REPLACE_WITH_SLUG.divband.ir
        - REPLACE_WITH_VERIFIED_CUSTOM_DOMAIN
  rules:
    - host: REPLACE_WITH_SLUG.divband.ir
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: REPLACE_WITH_PUBLIC_SERVICE_NAME
                port:
                  number: REPLACE_WITH_PUBLIC_SERVICE_PORT
    - host: REPLACE_WITH_VERIFIED_CUSTOM_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: REPLACE_WITH_PUBLIC_SERVICE_NAME
                port:
                  number: REPLACE_WITH_PUBLIC_SERVICE_PORT
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: public-web
  namespace: project-REPLACE_WITH_SLUG
  labels:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
spec:
  secretName: public-web-tls
  issuerRef:
    kind: ClusterIssuer
    name: REPLACE_WITH_CLUSTER_ISSUER
  dnsNames:
    - REPLACE_WITH_SLUG.divband.ir
    - REPLACE_WITH_VERIFIED_CUSTOM_DOMAIN
