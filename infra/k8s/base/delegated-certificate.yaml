# Optional Certificate template for custom domains that use delegated managed DNS.
# Use the DNS-01 issuer so cert-manager can request both the normal hostname and,
# where the ACME CA and delegated zone policy support it, the wildcard name.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: delegated-custom-domain
  namespace: REPLACE_WITH_NAMESPACE
  labels:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
    divband.io/hostname: REPLACE_WITH_VERIFIED_CUSTOM_DOMAIN
  annotations:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
spec:
  secretName: delegated-custom-domain-tls
  issuerRef:
    kind: ClusterIssuer
    name: REPLACE_WITH_ACME_DNS01_CLUSTER_ISSUER
  dnsNames:
    - REPLACE_WITH_VERIFIED_CUSTOM_DOMAIN
    - "*.REPLACE_WITH_VERIFIED_CUSTOM_DOMAIN"
