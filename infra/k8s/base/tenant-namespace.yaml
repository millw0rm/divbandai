apiVersion: v1
kind: Namespace
metadata:
  name: project-REPLACE_WITH_SLUG
  labels:
    divband.io/project-slug: REPLACE_WITH_SLUG
    divband.io/environment: production
    divband.io/managed-by: divband
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: project-quota
  namespace: project-REPLACE_WITH_SLUG
spec:
  hard:
    requests.cpu: '1'
    requests.memory: 1Gi
    limits.cpu: '2'
    limits.memory: 2Gi
    pods: '10'
    services: '5'
---
apiVersion: v1
kind: LimitRange
metadata:
  name: project-limits
  namespace: project-REPLACE_WITH_SLUG
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: project-REPLACE_WITH_SLUG
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
