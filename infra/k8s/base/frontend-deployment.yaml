apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: project-REPLACE_WITH_SLUG
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/project-slug: REPLACE_WITH_SLUG
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
  annotations:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
spec:
  replicas: REPLACE_WITH_FRONTEND_REPLICAS
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      divband.io/project-id: REPLACE_WITH_PROJECT_ID
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: frontend
        divband.io/project-id: REPLACE_WITH_PROJECT_ID
        divband.io/project-slug: REPLACE_WITH_SLUG
        divband.io/expose: public
        divband.io/tenant-id: REPLACE_WITH_TENANT_ID
        divband.io/environment: REPLACE_WITH_ENVIRONMENT
        divband.io/owner-id: REPLACE_WITH_OWNER_ID
      annotations:
        divband.io/project-id: REPLACE_WITH_PROJECT_ID
        divband.io/tenant-id: REPLACE_WITH_TENANT_ID
        divband.io/environment: REPLACE_WITH_ENVIRONMENT
        divband.io/owner-id: REPLACE_WITH_OWNER_ID
    spec:
      serviceAccountName: project-deployer
      containers:
        - name: frontend
          image: REPLACE_WITH_FRONTEND_IMAGE
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: project-secrets
                optional: true
          ports:
            - name: http
              containerPort: REPLACE_WITH_FRONTEND_CONTAINER_PORT
          readinessProbe:
            httpGet:
              path: REPLACE_WITH_FRONTEND_HEALTH_PATH
              port: http
          livenessProbe:
            httpGet:
              path: REPLACE_WITH_FRONTEND_HEALTH_PATH
              port: http
          resources:
            requests:
              cpu: REPLACE_WITH_FRONTEND_CPU_REQUEST
              memory: REPLACE_WITH_FRONTEND_MEMORY_REQUEST
            limits:
              cpu: REPLACE_WITH_FRONTEND_CPU_LIMIT
              memory: REPLACE_WITH_FRONTEND_MEMORY_LIMIT
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: project-REPLACE_WITH_SLUG
  labels:
    app.kubernetes.io/name: frontend
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
  annotations:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
  ports:
    - name: http
      port: 80
      targetPort: http
