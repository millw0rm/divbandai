# cert-manager ClusterIssuer templates for Divband public hostnames.
#
# Render one staging and one production issuer per environment. Use the HTTP-01
# issuer for platform subdomains and custom domains that already resolve to the
# public ingress. Use the DNS-01 issuer for delegated DNS, wildcard certificates,
# or domains where port 80 cannot be reached before certificate issuance.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: REPLACE_WITH_ACME_HTTP01_CLUSTER_ISSUER
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/part-of: divband-routing
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
  annotations:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
spec:
  acme:
    email: REPLACE_WITH_ACME_ACCOUNT_EMAIL
    server: REPLACE_WITH_ACME_SERVER_URL
    privateKeySecretRef:
      name: REPLACE_WITH_ACME_HTTP01_ACCOUNT_SECRET
    solvers:
      - http01:
          ingress:
            class: REPLACE_WITH_INGRESS_CLASS
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: REPLACE_WITH_ACME_DNS01_CLUSTER_ISSUER
  labels:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/part-of: divband-routing
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
  annotations:
    divband.io/project-id: REPLACE_WITH_PROJECT_ID
    divband.io/tenant-id: REPLACE_WITH_TENANT_ID
    divband.io/environment: REPLACE_WITH_ENVIRONMENT
    divband.io/owner-id: REPLACE_WITH_OWNER_ID
spec:
  acme:
    email: REPLACE_WITH_ACME_ACCOUNT_EMAIL
    server: REPLACE_WITH_ACME_SERVER_URL
    privateKeySecretRef:
      name: REPLACE_WITH_ACME_DNS01_ACCOUNT_SECRET
    solvers:
      - selector:
          dnsZones:
            - REPLACE_WITH_MANAGED_DNS_ZONE
        dns01:
          # Replace this example Cloudflare solver with the DNS provider or
          # cert-manager webhook used for divband.ir and delegated zones.
          cloudflare:
            apiTokenSecretRef:
              name: REPLACE_WITH_DNS_PROVIDER_API_TOKEN_SECRET
              key: api-token
