name: Deploy

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: Git commit SHA to deploy (defaults to this commit)
        type: string
        default: ""

permissions:
  contents: read

jobs:
  trigger-vps-deploy:
    name: Trigger VPS pull deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Trigger production webhook
        env:
          DIVBAND_DEPLOY_WEBHOOK_URL: ${{ secrets.DIVBAND_DEPLOY_WEBHOOK_URL }}
          DIVBAND_DEPLOY_WEBHOOK_SECRET: ${{ secrets.DIVBAND_DEPLOY_WEBHOOK_SECRET }}
          DIVBAND_DEPLOY_REF: ${{ github.ref_name }}
        run: |
          sha="${{ inputs.git_sha != '' && inputs.git_sha || github.sha }}"
          bash scripts/trigger-vps-deploy.sh "${sha}"
