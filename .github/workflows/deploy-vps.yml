name: Deploy VPS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-vps.yml'
      - 'apps/**'
      - 'packages/**'
      - 'infra/ansible/**'
      - 'infra/k8s/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:
    inputs:
      source_version:
        description: 'Git ref, tag, branch, or SHA to deploy'
        required: false
        default: 'main'

concurrency:
  group: divband-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VPS_HOST: ${{ vars.DIVBAND_VPS_HOST || '185.204.170.33' }}
      VPS_USER: ${{ vars.DIVBAND_VPS_USER || 'ubuntu' }}
      DIVBAND_SOURCE_REPO_URL: ${{ vars.DIVBAND_SOURCE_REPO_URL || 'https://github.com/millw0rm/divband.git' }}
      DIVBAND_SOURCE_VERSION: ${{ inputs.source_version || github.ref_name }}
      DIVBAND_PUBLIC_HOSTNAME: ${{ vars.DIVBAND_PUBLIC_HOSTNAME || '185.204.170.33.nip.io' }}
      DIVBAND_API_BASE_URL: ${{ vars.DIVBAND_API_BASE_URL || 'http://185.204.170.33/api' }}
      DIVBAND_PUBLIC_SITE_DOMAIN: ${{ vars.DIVBAND_PUBLIC_SITE_DOMAIN || '185.204.170.33.nip.io' }}
      DIVBAND_UPLOAD_DOMAIN: ${{ vars.DIVBAND_UPLOAD_DOMAIN || 'uploads.185.204.170.33.nip.io' }}
      CERT_MANAGER_ACME_EMAIL: ${{ vars.CERT_MANAGER_ACME_EMAIL || 'admin@divband.com' }}
      CERT_MANAGER_ACME_SERVER: ${{ vars.CERT_MANAGER_ACME_SERVER || 'https://acme-staging-v02.api.letsencrypt.org/directory' }}
      CERT_MANAGER_CLUSTER_ISSUER: ${{ vars.CERT_MANAGER_CLUSTER_ISSUER || 'letsencrypt-staging' }}
      CLUSTER_REGISTRY_ENDPOINT: ${{ vars.CLUSTER_REGISTRY_ENDPOINT || 'localhost:30500' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible-core

      - name: Configure SSH key
        env:
          DIVBAND_KEYRING_PASSWORD: ${{ secrets.DIVBAND_KEYRING_PASSWORD }}
        run: |
          if [ -z "$DIVBAND_KEYRING_PASSWORD" ]; then
            echo "::error title=Missing secret::Set DIVBAND_KEYRING_PASSWORD in this repository's GitHub Actions secrets."
            exit 1
          fi
          command -v openssl >/dev/null
          install -m 700 -d ~/.ssh
          scripts/decrypt-keyring-file.sh infra/keys/encrypted/github-actions-divband-vps.key.enc ~/.ssh/divband-vps
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Render VPS inventory
        working-directory: infra/ansible
        run: |
          cat > inventory.yml <<EOF
          ---
          all:
            vars:
              ansible_user: ${VPS_USER}
              ansible_ssh_private_key_file: ~/.ssh/divband-vps
              ansible_python_interpreter: /usr/bin/python3
              divband_environment: demo
              divband_timezone: UTC
              container_runtime_engine: containerd
              kubernetes_distribution: k3s
              kubernetes_api_endpoint: "https://${VPS_HOST}:6443"
              kubernetes_pod_cidr: 10.42.0.0/16
              kubernetes_service_cidr: 10.43.0.0/16
              kubernetes_template_dir: "{{ playbook_dir }}/../../k8s/base"
              ingress_class_name: nginx
              ingress_nginx_service_type: NodePort
              ingress_nginx_http_node_port: 32080
              ingress_nginx_https_node_port: 32443
              public_ingress_target: k8s_control_plane
              load_balancer_kubernetes_api_enabled: false
              load_balancer_keepalived_enabled: false
              cert_manager_cluster_issuer: ${CERT_MANAGER_CLUSTER_ISSUER}
              cert_manager_acme_email: ${CERT_MANAGER_ACME_EMAIL}
              cert_manager_acme_server: ${CERT_MANAGER_ACME_SERVER}
              external_secrets_store_name: divband-tenant-secrets
              external_secrets_provider: disabled
              gitlab_mode: connect
              gitlab_url: https://github.com
              gitlab_external_url: "{{ gitlab_url }}"
              gitlab_run_terraform: false
              divband_namespace: divband-system
              divband_source_repo_url: ${DIVBAND_SOURCE_REPO_URL}
              divband_source_version: ${DIVBAND_SOURCE_VERSION}
              cluster_registry_endpoint: ${CLUSTER_REGISTRY_ENDPOINT}
              divband_public_hostname: "${DIVBAND_PUBLIC_HOSTNAME}"
              divband_api_base_url: "${DIVBAND_API_BASE_URL}"
              divband_public_site_domain: "${DIVBAND_PUBLIC_SITE_DOMAIN}"
              divband_upload_domain: "${DIVBAND_UPLOAD_DOMAIN}"
              divband_object_storage_bucket: divband-local
              divband_object_storage_endpoint: http://localhost:9000
              divband_object_storage_region: us-east-1
              divband_object_storage_access_key_id: minioadmin
              divband_object_storage_secret_access_key: minioadmin
              divband_database_url: sqlite://./data/divband-backend.sqlite
              divband_gitlab_url: "{{ gitlab_url }}"
              divband_gitlab_token: ""
              divband_gitlab_access_token: ""
              divband_token_hash_pepper: divband-local-development-token-pepper
              divband_backend_replicas: 1
              divband_frontend_replicas: 1
            children:
              k8s_control_plane:
                hosts:
                  vps-1:
                    ansible_host: ${VPS_HOST}
              gitlab:
                hosts:
                  vps-1:
                    ansible_host: ${VPS_HOST}
              load_balancers:
                hosts:
                  vps-1:
                    ansible_host: ${VPS_HOST}
              monitoring:
                hosts:
                  vps-1:
                    ansible_host: ${VPS_HOST}
          EOF

      - name: Deploy from GitHub source through k3s registry
        working-directory: infra/ansible
        run: ansible-playbook playbooks/deploy-divband-from-github.yml

      - name: Verify rollout
        working-directory: infra/ansible
        run: |
          ansible k8s_control_plane[0] -m command -a "kubectl -n divband-system get deploy,pods -o wide" --become
