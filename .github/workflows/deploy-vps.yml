name: Deploy VPS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-vps.yml'
      - 'apps/**'
      - 'packages/**'
      - 'infra/ansible/**'
      - 'infra/k8s/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:
    inputs:
      source_version:
        description: 'Git ref, tag, branch, or SHA to deploy'
        required: false
        default: 'main'

concurrency:
  group: divband-vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VPS_HOST: ${{ vars.DIVBAND_VPS_HOST || '185.204.170.33' }}
      VPS_USER: ${{ vars.DIVBAND_VPS_USER || 'ubuntu' }}
      DIVBAND_SOURCE_REPO_URL: ${{ vars.DIVBAND_SOURCE_REPO_URL || 'https://github.com/millw0rm/divband.git' }}
      DIVBAND_SOURCE_VERSION: ${{ inputs.source_version || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible-core

      - name: Configure SSH key
        env:
          DIVBAND_KEYRING_PASSWORD: ${{ secrets.DIVBAND_KEYRING_PASSWORD }}
        run: |
          if [ -z "$DIVBAND_KEYRING_PASSWORD" ]; then
            echo "::error title=Missing secret::Set DIVBAND_KEYRING_PASSWORD in this repository's GitHub Actions secrets."
            exit 1
          fi
          command -v openssl >/dev/null
          install -m 700 -d ~/.ssh
          scripts/decrypt-keyring-file.sh infra/keys/encrypted/github-actions-divband-vps.key.enc ~/.ssh/divband-vps
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Render VPS inventory
        working-directory: infra/ansible
        run: |
          cp inventory.vps.yml inventory.yml
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path('inventory.yml')
          text = path.read_text()
          replacements = {
              'ansible_user: ubuntu': f"ansible_user: {os.environ['VPS_USER']}",
              'ansible_ssh_private_key_file: ~/.ssh/divband-vps': 'ansible_ssh_private_key_file: ~/.ssh/divband-vps',
              'kubernetes_api_endpoint: "https://185.204.170.33:6443"': f"kubernetes_api_endpoint: \"https://{os.environ['VPS_HOST']}:6443\"",
              'divband_source_repo_url: https://github.com/millw0rm/divband.git': f"divband_source_repo_url: {os.environ['DIVBAND_SOURCE_REPO_URL']}",
              'divband_source_version: main': f"divband_source_version: {os.environ['DIVBAND_SOURCE_VERSION']}",
              'ansible_host: 185.204.170.33': f"ansible_host: {os.environ['VPS_HOST']}",
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          path.write_text(text)
          PY

      - name: Deploy from GitHub source through k3s registry
        working-directory: infra/ansible
        run: ansible-playbook playbooks/deploy-divband-from-github.yml

      - name: Verify rollout
        working-directory: infra/ansible
        run: |
          ansible k8s_control_plane[0] -m command -a "kubectl -n divband-system get deploy,pods -o wide" --become
