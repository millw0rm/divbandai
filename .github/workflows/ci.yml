name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Run unit tests
        run: make test-api

  publish-images:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push project images
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_TAG: ${{ github.sha }}
          GHCR_EXTRA_TAGS: ${{ github.ref == 'refs/heads/main' && 'main' || '' }}
        run: python3 scripts/ghcr_publish.py

  integration:
    name: Docker stack and routing smoke
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Render Compose for GHCR images
        env:
          PYTHONPATH: scripts
        run: |
          python3 -c "
          from divband_projects import load_projects, render_compose
          render_compose(
              load_projects(),
              arvan=False,
              ghcr=True,
              ghcr_owner='${{ github.repository_owner }}',
              ghcr_tag='${{ github.sha }}',
          )
          "

      - name: Pull and start Compose stack
        run: |
          docker compose pull
          docker compose up -d

      - name: Wait for HAProxy
        run: |
          for _ in $(seq 1 30); do
            if curl --noproxy '*' -fsS -o /dev/null -H 'Host: divbandai.ir' http://127.0.0.1/; then
              exit 0
            fi
            sleep 2
          done
          echo 'HAProxy did not become ready in time' >&2
          docker compose ps
          docker compose logs
          exit 1

      - name: Smoke test project routing
        run: make smoke

      - name: Validate stack with Ansible
        working-directory: infra/ansible
        env:
          ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
          ANSIBLE_REMOTE_TEMP: /tmp/ansible-remote
        run: ansible-playbook playbooks/validate-local.yml

      - name: Show Compose status on failure
        if: failure()
        run: docker compose ps && docker compose logs

  deploy-production:
    name: Deploy to production VPS
    runs-on: ubuntu-latest
    needs: integration
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Ansible
        run: pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Deploy to VPS
        uses: ./.github/actions/deploy-vps
        with:
          arvan_enabled: ${{ vars.DIVBAND_ARVAN_ENABLED != 'false' && 'true' || 'false' }}
          validate_after_deploy: "true"
          use_ghcr: "true"
          ghcr_owner: ${{ github.repository_owner }}
          ghcr_image_tag: ${{ github.sha }}
          ghcr_token: ${{ secrets.DIVBAND_GHCR_TOKEN }}
          ssh_private_key: ${{ secrets.DIVBAND_SSH_PRIVATE_KEY }}
          vps_host: ${{ secrets.DIVBAND_VPS_HOST }}
          vps_user: ${{ secrets.DIVBAND_VPS_USER || 'ubuntu' }}
