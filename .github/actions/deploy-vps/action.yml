name: Deploy Divband VPS
description: Run Ansible remote-docker (and optional validate-vps) via SSH or on-host (local).

inputs:
  deploy_mode:
    description: "ssh: connect to DIVBAND_VPS_HOST; local: Ansible on this runner (self-hosted on VPS)"
    required: false
    default: ssh
  arvan_enabled:
    description: Enable Arvan mirror and registry on the VPS
    required: false
    default: "true"
  validate_after_deploy:
    description: Run validate-vps after deploy
    required: false
    default: "true"
  use_ghcr:
    description: Pull buildable project images from GHCR instead of building on the VPS
    required: false
    default: "false"
  ghcr_owner:
    description: GHCR namespace (GitHub user or org, lowercase)
    required: false
    default: ""
  ghcr_image_tag:
    description: Image tag to deploy (usually the git commit SHA)
    required: false
    default: main
  ghcr_token:
    description: PAT with read:packages for private GHCR pulls on the VPS (optional if packages are public)
    required: false
    default: ""
  ssh_private_key:
    description: SSH private key (required when deploy_mode=ssh)
    required: false
    default: ""
  vps_host:
    description: VPS public IP or hostname (required when deploy_mode=ssh)
    required: false
    default: ""
  vps_user:
    description: SSH user on the VPS
    required: false
    default: ubuntu

runs:
  using: composite
  steps:
    - name: Deploy with Ansible
      shell: bash
      env:
        DIVBAND_DEPLOY_MODE: ${{ inputs.deploy_mode }}
        DIVBAND_SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        DIVBAND_VPS_HOST: ${{ inputs.vps_host }}
        DIVBAND_VPS_USER: ${{ inputs.vps_user }}
        DIVBAND_ARVAN_ENABLED: ${{ inputs.arvan_enabled }}
        DIVBAND_VALIDATE_AFTER_DEPLOY: ${{ inputs.validate_after_deploy }}
        DIVBAND_USE_GHCR: ${{ inputs.use_ghcr }}
        DIVBAND_GHCR_OWNER: ${{ inputs.ghcr_owner }}
        DIVBAND_GHCR_IMAGE_TAG: ${{ inputs.ghcr_image_tag }}
        DIVBAND_GHCR_TOKEN: ${{ inputs.ghcr_token }}
      run: bash scripts/github-actions-deploy.sh
