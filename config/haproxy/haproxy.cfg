global
    log stdout format raw local0
    maxconn 2048

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend public_http
    bind *:80

    acl host_test hdr(host) -i divbandai.ir www.divbandai.ir test.divbandai.ir

    use_backend test_project if host_test
    acl host_test2 hdr(host) -i test2.divbandai.ir

    use_backend test2_project if host_test2
    default_backend unknown_host

backend test_project
    option httpchk GET /healthz
    http-check expect status 200
    server test_web test-web:80 check

backend test2_project
    option httpchk GET /healthz
    http-check expect status 200
    server test2_web test2-web:3000 check

backend unknown_host
    http-request return status 404 content-type text/plain string "Unknown divband host\n"
