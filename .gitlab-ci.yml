stages:
  - dependencies
  - build
  - publish

variables:
  NODE_VERSION: "22"
  DOCKER_VERSION: "27.5.1"
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"
  BACKEND_IMAGE_NAME: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE_NAME: "$CI_REGISTRY_IMAGE/frontend"
  # Set DEPLOYMENT_IMAGE_TAG (for example, production or staging) when a branch
  # or release should also move a mutable deployment pointer after the immutable
  # commit-SHA images are published.
  DEPLOYMENT_IMAGE_TAG: ""

.npm_install: &npm_install
  - |
    if [ -f package-lock.json ]; then
      npm ci
    else
      npm install
    fi

install_workspace_dependencies:
  stage: dependencies
  image: node:${NODE_VERSION}-bookworm-slim
  script: *npm_install
  artifacts:
    expire_in: 1 hour
    paths:
      - node_modules/
      - apps/*/node_modules/
      - packages/*/node_modules/

build_backend:
  stage: build
  image: node:${NODE_VERSION}-bookworm-slim
  needs:
    - job: install_workspace_dependencies
      artifacts: true
  script:
    - npm run build --workspace @divband/backend

build_frontend:
  stage: build
  image: node:${NODE_VERSION}-bookworm-slim
  needs:
    - job: install_workspace_dependencies
      artifacts: true
  script:
    - npm run build --workspace @divband/frontend
  artifacts:
    expire_in: 1 week
    paths:
      - apps/frontend/dist/

publish_images:
  stage: publish
  image: docker:${DOCKER_VERSION}
  services:
    - name: docker:${DOCKER_VERSION}-dind
      alias: docker
  needs:
    - build_backend
    - build_frontend
  rules:
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
  script:
    - export BACKEND_SHA_IMAGE="${BACKEND_IMAGE_NAME}:${CI_COMMIT_SHA}"
    - export FRONTEND_SHA_IMAGE="${FRONTEND_IMAGE_NAME}:${CI_COMMIT_SHA}"
    - docker build --pull --file apps/backend/Dockerfile --tag "$BACKEND_SHA_IMAGE" .
    - docker build --pull --file apps/frontend/Dockerfile --tag "$FRONTEND_SHA_IMAGE" --build-arg DIVBAND_API_BASE_URL="${DIVBAND_API_BASE_URL:-/api}" .
    - docker push "$BACKEND_SHA_IMAGE"
    - docker push "$FRONTEND_SHA_IMAGE"
    - |
      if [ -n "$DEPLOYMENT_IMAGE_TAG" ]; then
        docker tag "$BACKEND_SHA_IMAGE" "${BACKEND_IMAGE_NAME}:${DEPLOYMENT_IMAGE_TAG}"
        docker tag "$FRONTEND_SHA_IMAGE" "${FRONTEND_IMAGE_NAME}:${DEPLOYMENT_IMAGE_TAG}"
        docker push "${BACKEND_IMAGE_NAME}:${DEPLOYMENT_IMAGE_TAG}"
        docker push "${FRONTEND_IMAGE_NAME}:${DEPLOYMENT_IMAGE_TAG}"
      fi
