services:
  haproxy:
    image: docker.arvancloud.ir/haproxy:2.9-alpine
    container_name: divband-haproxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./config/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - test-web
      - test2-web
    networks:
      - divband

  test-web:
    image: docker.arvancloud.ir/nginx:1.27-alpine
    container_name: divband-test-web
    restart: unless-stopped
    volumes:
      - ./projects/test/html:/usr/share/nginx/html:ro
      - ./projects/test/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - divband

  test2-web:
    image: divband-test2:local
    build:
      context: ./projects/test2
      dockerfile: Dockerfile
    container_name: divband-test2-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - divband

networks:
  divband:
    name: divband
